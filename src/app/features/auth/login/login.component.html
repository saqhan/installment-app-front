<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Вход</mat-card-title>
      <mat-card-subtitle>Installment App</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          @if (form.controls.email.hasError('required')) {
            <mat-error>Введите email</mat-error>
          } @else if (form.controls.email.hasError('email')) {
            <mat-error>Некорректный email</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Пароль</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          @if (form.controls.password.hasError('required')) {
            <mat-error>Введите пароль</mat-error>
          }
        </mat-form-field>

        @if (error) {
          <p class="error-msg">{{ error }}</p>
        }

        <button mat-flat-button type="submit" [disabled]="loading">
          @if (loading) {
            <mat-spinner diameter="20" />
          } @else {
            Войти
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a routerLink="/register">Регистрация по приглашению</a>
    </mat-card-actions>
  </mat-card>
</div>
